name: Windows Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      minimal-build:
        description: 'Build with minimal dependencies (CLI only, no Qt UI)'
        required: false
        default: 'false'

env:
  CUDA_VERSION: "12.8.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ────────────────────────────────────────────────────────────────────────
      # 1. Check disk space early (CUDA + vcpkg need lots of room)
      # ────────────────────────────────────────────────────────────────────────
      - name: Check disk space
        shell: pwsh
        run: |
          $free_gb = [math]::Round((Get-PSDrive C).Free / 1GB, 1)
          Write-Host "Free disk: ${free_gb}GB"
          if ($free_gb -lt 15) {
            Write-Warning "Only ${free_gb}GB free — CUDA + vcpkg may need >15GB"
          }

      # ────────────────────────────────────────────────────────────────────────
      # 2. Install CUDA Toolkit via marketplace action (reliable, cached)
      # ────────────────────────────────────────────────────────────────────────
      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.22
        id: cuda-install
        with:
          cuda: ${{ env.CUDA_VERSION }}
          sub-packages: '["nvcc", "cudart", "cublas", "cufft", "curand"]'

      - name: Verify CUDA
        shell: pwsh
        run: |
          $cuda_path = "${{ steps.cuda-install.outputs.CUDA_PATH }}"
          Write-Host "CUDA installed at: $cuda_path"
          & "$cuda_path\bin\nvcc.exe" --version
          echo "CUDA_PATH=$cuda_path" | Out-File -FilePath $env:GITHUB_ENV -Append

      # ────────────────────────────────────────────────────────────────────────
      # 3. vcpkg — pre-installed at C:\vcpkg on windows-latest runner
      # ────────────────────────────────────────────────────────────────────────
      - name: Verify vcpkg
        shell: pwsh
        run: |
          $vcpkg_root = if ($env:VCPKG_INSTALLATION_ROOT) { $env:VCPKG_INSTALLATION_ROOT } else { "C:\vcpkg" }
          echo "VCPKG_ROOT=$vcpkg_root" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "vcpkg root: $vcpkg_root"
          & "$vcpkg_root\vcpkg" version

      - name: Setup vcpkg cache
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('**/vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Install vcpkg dependencies
        shell: pwsh
        run: |
          $vcpkg_root = "$env:VCPKG_ROOT"
          Write-Host "vcpkg root: $vcpkg_root"

          & "$vcpkg_root\vcpkg" integrate install

          $minimal = "${{ github.event.inputs.minimal-build }}" -eq 'true'

          if ($minimal) {
            Write-Host "minimal build — CLI tools only, no Qt UI"
            & "$vcpkg_root\vcpkg" install `
              ceres[lapack,schur,suitesparse] `
              cuda `
              eigen3 `
              gflags `
              glog `
              nlohmann-json `
              "opencv4[jpeg,png,tiff]" `
              --triplet x64-windows `
              --clean-after-build
          } else {
            Write-Host "full build — including Qt5 UI and GDAL"
            & "$vcpkg_root\vcpkg" install `
              ceres[lapack,schur,suitesparse] `
              cuda `
              egl `
              eigen3 `
              gflags `
              glew `
              glog `
              "gdal[core,curl,expat,geos,jpeg,png,sqlite3]" `
              nlohmann-json `
              "opencv4[jpeg,png,tiff]" `
              "qt5-base" `
              --triplet x64-windows `
              --clean-after-build
          }

          if ($LASTEXITCODE -ne 0) {
            Write-Error "vcpkg install failed"
            exit 1
          }

          Write-Host "vcpkg dependencies installed successfully"

      # ────────────────────────────────────────────────────────────────────────
      # 4. CMake Configure
      # ────────────────────────────────────────────────────────────────────────
      - name: Configure CMake
        shell: pwsh
        run: |
          $cuda_path = "${{ steps.cuda-install.outputs.CUDA_PATH }}"
          $nvcc_path = "$cuda_path\bin\nvcc.exe"
          $vcpkg_root = "$env:VCPKG_INSTALLATION_ROOT"

          if (-Not (Test-Path $nvcc_path)) {
            Write-Error "nvcc.exe not found at $nvcc_path"
            exit 1
          }

          Write-Host "CUDA path : $cuda_path"
          Write-Host "NVCC      : $nvcc_path"
          Write-Host "vcpkg     : $vcpkg_root"

          cmake -B build -S . `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$vcpkg_root/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_CUDA_COMPILER="$nvcc_path" `
            -DCUDAToolkit_ROOT="$cuda_path" `
            -DCMAKE_CUDA_ARCHITECTURES="60-virtual;61-virtual;70-virtual;75-virtual;80-virtual;86-virtual;89-virtual;90-virtual;120-virtual" `
            -DSIFTGPU_ENABLE_CUDA=OFF `
            -DINSIGHTAT_ENABLE_SIFTGPU=OFF

          if ($LASTEXITCODE -ne 0) {
            Write-Error "CMake configuration failed"
            exit 1
          }
          Write-Host "CMake configured successfully"

      # ────────────────────────────────────────────────────────────────────────
      # 5. Build
      # ────────────────────────────────────────────────────────────────────────
      - name: Build
        shell: pwsh
        run: |
          $cores = $env:NUMBER_OF_PROCESSORS
          Write-Host "Building with ${cores} cores..."
          cmake --build build --config Release --verbose -j $cores

          if ($LASTEXITCODE -ne 0) {
            Write-Error "Build failed"
            exit 1
          }
          Write-Host "Build completed successfully"

      # ────────────────────────────────────────────────────────────────────────
      # 6. Cleanup temporary files to reclaim disk
      # ────────────────────────────────────────────────────────────────────────
      - name: Cleanup temporary files
        if: always()
        shell: pwsh
        run: |
          $vcpkg_root = "$env:VCPKG_INSTALLATION_ROOT"
          Remove-Item -Path "$vcpkg_root\buildtrees" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "$vcpkg_root\packages" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "$vcpkg_root\downloads" -Recurse -Force -ErrorAction SilentlyContinue
          Write-Host "Cleanup done"

      # ────────────────────────────────────────────────────────────────────────
      # 7. Run tests (skip GPU-dependent tests that need EGL/hardware)
      # ────────────────────────────────────────────────────────────────────────
      - name: Run tests
        shell: pwsh
        working-directory: build
        run: |
          # Exclude tests that require GPU / EGL hardware (not available on GitHub runners)
          ctest --build-config Release --output-on-failure `
            -E "gpu_|twoview|incremental_triangulation|seed_eval" `
            --timeout 120

      # ────────────────────────────────────────────────────────────────────────
      # 8. Upload build artifacts
      # ────────────────────────────────────────────────────────────────────────
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: insightat-windows-cuda-${{ env.CUDA_VERSION }}
          path: |
            build/Release/*.exe
            build/Release/*.dll
            build/Release/*.pdb
          retention-days: 30